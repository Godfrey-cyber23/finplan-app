<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>FinPlan | Personal Planner &amp; Budget</title>
    <style>
        /* ===== THEME TOKENS ===== */
        :root{
            --bg:#f0f2f5;--surface:#ffffff;--surface-raised:#f8fafc;
            --text-primary:#1e293b;--text-secondary:#64748b;--text-muted:#94a3b8;
            --border:#e2e8f0;--border-subtle:#f1f5f9;
            --accent:#3b82f6;--accent-hover:#2563eb;--accent-rgb:59,130,246;--accent-bg:rgba(59,130,246,0.08);
            --success:#10b981;--success-bg:#f0fdf4;--success-border:#dcfce7;
            --danger:#ef4444;--danger-bg:#fef2f2;--danger-border:#fee2e2;
            --warning:#f59e0b;--warning-bg:#fffbeb;--warning-border:#fef3c7;
            --purple:#8b5cf6;--purple-bg:#f5f3ff;--purple-border:#ede9fe;
            --radius-sm:0.5rem;--radius-md:0.75rem;--radius-lg:1rem;--radius-xl:1.25rem;
            --shadow-sm:0 1px 2px rgba(0,0,0,0.04);--shadow-md:0 4px 12px rgba(0,0,0,0.06);--shadow-lg:0 8px 25px rgba(0,0,0,0.1);
            --nav-height:4.5rem;--transition:0.2s ease;
            --overlay-bg:rgba(0,0,0,0.45);
            --income-card-text:#166534;--income-badge-text:#166534;--expense-badge-text:#991b1b;
            --thermo-tube:#f1f5f9;--thermo-border:#cbd5e1;--thermo-line:rgba(0,0,0,0.06);
            --nav-bg:rgba(255,255,255,0.92);
        }

        /* Dark mode base tokens */
        [data-theme="dark"]{
            --bg:#0c0f1a;--surface:#161b2e;--surface-raised:#1c2240;
            --text-primary:#e8ecf4;--text-secondary:#8b95b0;--text-muted:#525e7a;
            --border:#252d48;--border-subtle:#1e2640;
            --accent-bg:rgba(59,130,246,0.12);
            --success-bg:rgba(16,185,129,0.1);--success-border:rgba(16,185,129,0.2);
            --danger-bg:rgba(239,68,68,0.1);--danger-border:rgba(239,68,68,0.2);
            --warning-bg:rgba(245,158,11,0.1);--warning-border:rgba(245,158,11,0.2);
            --purple-bg:rgba(139,92,246,0.1);--purple-border:rgba(139,92,246,0.2);
            --shadow-sm:0 1px 2px rgba(0,0,0,0.2);--shadow-md:0 4px 12px rgba(0,0,0,0.25);--shadow-lg:0 8px 25px rgba(0,0,0,0.35);
            --overlay-bg:rgba(0,0,0,0.65);
            --income-card-text:#6ee7b7;--income-badge-text:#6ee7b7;--expense-badge-text:#fca5a5;
            --thermo-tube:#1e2640;--thermo-border:#2a3555;--thermo-line:rgba(255,255,255,0.04);
            --nav-bg:rgba(22,27,46,0.92);
        }

        /* High contrast mode overrides */
        [data-contrast="high"]{
            --bg:#000000;--surface:#0a0a0a;--surface-raised:#111111;
            --text-primary:#ffffff;--text-secondary:#e0e0e0;--text-muted:#b0b0b0;
            --border:#555555;--border-subtle:#333333;
            --shadow-sm:0 0 0 1px rgba(255,255,255,0.15);--shadow-md:0 0 0 1px rgba(255,255,255,0.2);--shadow-lg:0 0 0 2px rgba(255,255,255,0.25);
        }
        [data-contrast="high"] .pin-dot{border-width:3px;border-color:rgba(255,255,255,0.5)}
        [data-contrast="high"] .pin-dot.filled{border-color:#fff}
        [data-contrast="high"] .form-input,[data-contrast="high"] .form-select{border-width:2px}
        [data-contrast="high"] .btn-primary{border:2px solid rgba(255,255,255,0.3)}
        [data-contrast="high"] .task-checkbox{border-width:3px}
        [data-contrast="high"] .filter-pill{border-width:2px}
        [data-contrast="high"] .nav-item.active::before{height:4px}

        /* Light theme-specific dark overrides */
        [data-theme="dark"][data-contrast="high"]{
            --bg:#000000;--surface:#050505;--surface-raised:#0a0a0a;
            --border:#666666;--border-subtle:#444444;
        }

        /* Pastel theme tokens */
        [data-color-theme="pastel"]{
            --accent:#a78bfa;--accent-hover:#8b5cf6;--accent-rgb:167,139,250;
            --success:#6ee7b7;--danger:#fca5a5;--warning:#fcd34d;--purple:#c4b5fd;
        }
        [data-color-theme="pastel"][data-theme="dark"]{
            --accent:#c4b5fd;--accent-hover:#a78bfa;--accent-rgb:196,181,253;
            --success:#6ee7b7;--danger:#fca5a5;--warning:#fcd34d;--purple:#ddd6fe;
        }

        /* Vibrant theme tokens */
        [data-color-theme="vibrant"]{
            --accent:#06b6d4;--accent-hover:#0891b2;--accent-rgb:6,182,212;
            --success:#22c55e;--danger:#f43f5e;--warning:#eab308;--purple:#a855f7;
        }
        [data-color-theme="vibrant"][data-theme="dark"]{
            --accent:#22d3ee;--accent-hover:#06b6d4;--accent-rgb:34,211,238;
            --success:#4ade80;--danger:#fb7185;--warning:#facc15;--purple:#c084fc;
        }

        /* Custom accent (set via JS) */
        [data-color-theme="custom"]{
            --accent:var(--custom-accent);--accent-hover:var(--custom-accent-dark);--accent-rgb:var(--custom-accent-rgb);
        }

        /* ===== BASE STYLES ===== */
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
        body{font-family:system-ui,-apple-system,'Segoe UI','Inter',Roboto,sans-serif;background:var(--bg);color:var(--text-primary);overflow-x:hidden;-webkit-font-smoothing:antialiased;transition:background 0.35s ease,color 0.35s ease}

        /* ===== LOCK SCREEN ===== */
        .lock-screen{position:fixed;inset:0;z-index:10000;background:linear-gradient(160deg,#0f172a 0%,#1e293b 40%,#0f172a 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;color:white;padding:2rem}
        .lock-screen::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle at 30% 20%,rgba(59,130,246,0.08) 0%,transparent 50%),radial-gradient(circle at 70% 80%,rgba(139,92,246,0.06) 0%,transparent 50%);animation:lockBg 20s ease-in-out infinite alternate}
        @keyframes lockBg{from{transform:translate(0,0)}to{transform:translate(-3%,2%)}}
        .lock-content{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;width:100%;max-width:320px}
        .lock-logo{font-size:1.75rem;font-weight:800;letter-spacing:-0.03em;margin-bottom:0.25rem;background:linear-gradient(135deg,#60a5fa,#a78bfa);-webkit-background-clip:text;background-clip:text;color:transparent}
        .lock-subtitle{font-size:0.85rem;color:rgba(255,255,255,0.5);margin-bottom:2.5rem;min-height:1.2em;transition:all 0.3s ease}
        .pin-dots{display:flex;gap:1.25rem;margin-bottom:2.5rem}
        .pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid rgba(255,255,255,0.2);transition:all 0.2s cubic-bezier(0.4,0,0.2,1)}
        .pin-dot.filled{background:white;border-color:white;transform:scale(1.15)}
        .pin-dot.error{border-color:var(--danger);background:var(--danger)}
        .pin-dot.success{border-color:var(--success);background:var(--success)}
        @keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}
        .shake{animation:shake 0.4s ease}
        @keyframes dotPop{0%{transform:scale(1)}50%{transform:scale(1.4)}100%{transform:scale(1.15)}}
        .dot-pop{animation:dotPop 0.25s ease}
        .pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:0.875rem;width:240px}
        .pin-key{width:72px;height:72px;border-radius:50%;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.04);color:white;font-size:1.5rem;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.12s ease;user-select:none;-webkit-tap-highlight-color:transparent;justify-self:center;font-family:inherit}
        .pin-key:hover{background:rgba(255,255,255,0.08)}
        .pin-key:active{background:rgba(255,255,255,0.18);transform:scale(0.9)}
        .pin-key svg{width:22px;height:22px}
        .pin-key.action-key{font-size:0;background:transparent;border-color:transparent}
        .pin-key.action-key:hover{background:rgba(255,255,255,0.06)}
        .bio-btn{margin-top:2rem;display:flex;align-items:center;gap:0.6rem;background:none;border:1px solid rgba(255,255,255,0.15);color:rgba(255,255,255,0.6);padding:0.65rem 1.25rem;border-radius:2rem;cursor:pointer;font-size:0.8rem;font-family:inherit;transition:all 0.2s ease}
        .bio-btn:hover{background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.8)}
        .bio-btn:active{transform:scale(0.96)}
        .bio-btn svg{width:18px;height:18px}
        .lock-error{color:var(--danger);font-size:0.8rem;margin-top:1rem;min-height:1.2em;transition:all 0.3s ease}
        .lock-countdown{color:var(--warning);font-size:0.85rem;margin-top:1rem;font-weight:600}
        .lock-reset{margin-top:1.5rem}
        .lock-reset button{background:none;border:none;color:rgba(255,255,255,0.3);font-size:0.75rem;cursor:pointer;text-decoration:underline;font-family:inherit;transition:color 0.2s}
        .lock-reset button:hover{color:rgba(255,255,255,0.6)}
        .lock-screen.hiding{opacity:0;transition:opacity 0.35s ease;pointer-events:none}

        /* ===== TOAST ===== */
        .toast-container{position:fixed;top:1rem;left:50%;transform:translateX(-50%);z-index:9999;display:flex;flex-direction:column;gap:0.5rem;pointer-events:none;width:calc(100% - 2rem);max-width:400px}
        .toast{pointer-events:auto;background:var(--text-primary);color:var(--bg);padding:0.75rem 1rem;border-radius:var(--radius-md);font-size:0.85rem;font-weight:500;box-shadow:var(--shadow-lg);animation:toastIn 0.3s ease,toastOut 0.3s ease 2.2s forwards;transition:background 0.35s,color 0.35s}
        .toast.success{background:var(--success);color:white}.toast.error{background:var(--danger);color:white}.toast.info{background:var(--accent);color:white}
        @keyframes toastIn{from{opacity:0;transform:translateY(-1rem)}to{opacity:1;transform:translateY(0)}}
        @keyframes toastOut{from{opacity:1}to{opacity:0;transform:translateY(-0.5rem)}}

        /* ===== BOTTOM NAV ===== */
        .bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--nav-bg);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);display:flex;justify-content:space-around;padding:0.5rem 0.25rem calc(0.5rem + env(safe-area-inset-bottom));border-top:1px solid var(--border);z-index:100;transition:background 0.35s,border-color 0.35s}
        .nav-item{display:flex;flex-direction:column;align-items:center;gap:0.15rem;text-decoration:none;color:var(--text-muted);font-size:0.6rem;font-weight:500;padding:0.4rem 0.5rem;border-radius:var(--radius-md);transition:all var(--transition);position:relative}
        .nav-item svg{width:20px;height:20px;transition:all var(--transition)}
        .nav-item.active{color:var(--accent)}
        .nav-item.active svg{transform:scale(1.1)}
        .nav-item.active::before{content:'';position:absolute;top:-0.5rem;left:50%;transform:translateX(-50%);width:20px;height:3px;background:var(--accent);border-radius:0 0 3px 3px}

        /* ===== APP CONTAINER ===== */
        .app-container{display:flex;flex-direction:column;min-height:100vh}
        .main-content{flex:1;padding:1rem;padding-bottom:calc(var(--nav-height) + 1.5rem);animation:fadeIn 0.25s ease}
        @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
        @media(min-width:768px){.main-content{padding:1.5rem}}
        @media(min-width:1024px){.main-content{max-width:1100px;margin:0 auto}}

        /* ===== TOP BAR ===== */
        .top-bar{margin-bottom:1.25rem}
        .top-bar h1{font-size:1.5rem;font-weight:800;letter-spacing:-0.02em;background:linear-gradient(135deg,var(--accent),var(--purple));-webkit-background-clip:text;background-clip:text;color:transparent;transition:background 0.35s}
        .date-display{color:var(--text-secondary);font-size:0.8rem;margin-top:0.15rem;transition:color 0.35s}
        .top-bar-row{display:flex;justify-content:space-between;align-items:flex-start}
        .top-bar-actions{display:flex;gap:0.15rem;flex-shrink:0}

        /* ===== CARDS ===== */
        .card{background:var(--surface);border-radius:var(--radius-xl);padding:1.25rem;margin-bottom:0.875rem;box-shadow:var(--shadow-sm);border:1px solid var(--border);transition:transform var(--transition),box-shadow var(--transition),background 0.35s,border-color 0.35s}
        .card:active{transform:scale(0.985)}
        @media(hover:hover){.card:hover{transform:translateY(-1px);box-shadow:var(--shadow-md)}}
        .card-title{font-size:0.8rem;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:0.04em;margin-bottom:0.75rem;display:flex;align-items:center;gap:0.4rem;transition:color 0.35s}
        .card-title svg{width:16px;height:16px;stroke:currentColor}
        .grid-1{display:grid;gap:0.875rem}.grid-2{display:grid;grid-template-columns:1fr;gap:0.875rem}.grid-3{display:grid;grid-template-columns:1fr;gap:0.875rem}
        @media(min-width:480px){.grid-2{grid-template-columns:repeat(2,1fr)}.grid-3{grid-template-columns:repeat(2,1fr)}}
        @media(min-width:768px){.grid-3{grid-template-columns:repeat(3,1fr)}}

        .summary-card{background:linear-gradient(135deg,var(--accent) 0%,var(--accent-hover) 50%,color-mix(in srgb,var(--accent-hover) 80%,black) 100%);color:white;border:none;position:relative;overflow:hidden;transition:background 0.35s}
        .summary-card::after{content:'';position:absolute;top:-40%;right:-20%;width:200px;height:200px;background:rgba(255,255,255,0.06);border-radius:50%}
        .summary-card .card-title{color:rgba(255,255,255,0.8)}
        .large-balance{font-size:2rem;font-weight:800;letter-spacing:-0.02em;margin:0.5rem 0}
        @media(min-width:768px){.large-balance{font-size:2.5rem}}

        .stat-row{display:flex;justify-content:space-between;align-items:center;padding:0.6rem 0;border-bottom:1px solid var(--border-subtle);font-size:0.875rem;transition:border-color 0.35s}
        .stat-row:last-child{border-bottom:none}
        .stat-label{color:var(--text-secondary);transition:color 0.35s}.stat-value{font-weight:700}
        .stat-value.income{color:var(--success)}.stat-value.expense{color:var(--danger)}

        .income-card{background:var(--success-bg);border-radius:var(--radius-md);padding:0.875rem;border-left:3px solid var(--success);transition:all var(--transition)}
        @media(hover:hover){.income-card:hover{box-shadow:var(--shadow-sm)}}
        .income-card .source-name{font-weight:700;font-size:0.9rem;color:var(--income-card-text)}
        .income-card .source-amount{font-size:1.15rem;font-weight:800;color:var(--success);margin-top:0.25rem}
        .income-card .source-freq{font-size:0.7rem;color:var(--text-muted);margin-top:0.15rem}
        .income-card .source-monthly{font-size:0.7rem;color:var(--text-secondary);margin-top:0.35rem}
        .income-card .actions{display:flex;gap:0.25rem;margin-top:0.5rem}

        .account-card{background:var(--surface-raised);border-radius:var(--radius-md);padding:0.875rem;display:flex;justify-content:space-between;align-items:center;border:1px solid var(--border-subtle);transition:background 0.35s,border-color 0.35s}
        .account-name{font-weight:600;font-size:0.9rem}.account-balance{color:var(--accent);font-weight:700;font-size:1.05rem;margin-top:0.15rem;transition:color 0.35s}

        .progress-track{width:100%;height:8px;background:var(--border-subtle);border-radius:4px;overflow:hidden;transition:background 0.35s}
        .progress-fill{height:100%;border-radius:4px;transition:width 0.6s cubic-bezier(0.4,0,0.2,1)}
        .progress-fill.green{background:linear-gradient(90deg,#10b981,#34d399)}.progress-fill.blue{background:linear-gradient(90deg,#3b82f6,#60a5fa)}
        .progress-fill.red{background:linear-gradient(90deg,#ef4444,#f87171)}.progress-fill.yellow{background:linear-gradient(90deg,#f59e0b,#fbbf24)}
        .progress-fill.purple{background:linear-gradient(90deg,#8b5cf6,#a78bfa)}

        .budget-category{padding:0.75rem 0;border-bottom:1px solid var(--border-subtle);transition:border-color 0.35s}.budget-category:last-child{border-bottom:none}
        .budget-cat-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:0.4rem}
        .budget-cat-name{font-size:0.875rem;font-weight:600;display:flex;align-items:center;gap:0.35rem}
        .budget-cat-amounts{font-size:0.8rem;color:var(--text-secondary);transition:color 0.35s}.budget-cat-amounts strong{color:var(--text-primary)}

        .table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;margin:0 -0.5rem}
        .data-table{width:100%;border-collapse:collapse;min-width:520px;font-size:0.85rem}
        .data-table th{padding:0.6rem 0.5rem;text-align:left;font-weight:600;font-size:0.75rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.04em;border-bottom:2px solid var(--border);transition:color 0.35s,border-color 0.35s}
        .data-table td{padding:0.65rem 0.5rem;border-bottom:1px solid var(--border-subtle);vertical-align:middle;transition:border-color 0.35s}
        .data-table tr:last-child td{border-bottom:none}
        .type-badge{display:inline-block;padding:0.15rem 0.5rem;border-radius:1rem;font-size:0.7rem;font-weight:600;text-transform:capitalize}
        .type-badge.income{background:var(--success-border);color:var(--income-badge-text)}.type-badge.expense{background:var(--danger-border);color:var(--expense-badge-text)}

        .receipt-indicator{display:inline-flex;align-items:center;gap:0.2rem;color:var(--accent);cursor:pointer;padding:0.2rem;border-radius:var(--radius-sm);transition:all var(--transition)}
        .receipt-indicator:hover{background:var(--accent-bg)}
        .receipt-indicator svg{width:16px;height:16px}

        .task-item{display:flex;align-items:center;gap:0.75rem;padding:0.75rem 0;border-bottom:1px solid var(--border-subtle);transition:border-color 0.35s}.task-item:last-child{border-bottom:none}
        .task-item.completed{opacity:0.55}.task-item.completed .task-text{text-decoration:line-through}
        .task-checkbox{width:20px;height:20px;border-radius:50%;border:2px solid var(--border);appearance:none;-webkit-appearance:none;cursor:pointer;flex-shrink:0;transition:all var(--transition);position:relative;background:transparent}
        .task-checkbox:checked{background:var(--accent);border-color:var(--accent)}
        .task-checkbox:checked::after{content:'';position:absolute;top:3px;left:6px;width:5px;height:9px;border:solid white;border-width:0 2px 2px 0;transform:rotate(45deg)}
        .task-checkbox:focus-visible{box-shadow:0 0 0 3px rgba(var(--accent-rgb),0.2)}
        .task-text{font-size:0.875rem;flex:1;line-height:1.4}.task-date{font-size:0.7rem;color:var(--text-muted);margin-top:0.1rem}

        .filter-pills{display:flex;gap:0.4rem;margin-bottom:1rem}
        .filter-pill{padding:0.4rem 0.9rem;border-radius:2rem;border:1px solid var(--border);background:var(--surface);cursor:pointer;font-size:0.8rem;font-weight:500;color:var(--text-secondary);transition:all var(--transition);flex:1;text-align:center}
        .filter-pill.active{background:var(--accent);color:white;border-color:var(--accent)}

        .form-group{margin-bottom:0.875rem}
        .form-label{display:block;font-size:0.8rem;font-weight:600;color:var(--text-secondary);margin-bottom:0.35rem;transition:color 0.35s}
        .form-input,.form-select{width:100%;padding:0.7rem 0.875rem;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:0.95rem;font-family:inherit;transition:all var(--transition),background 0.35s,border-color 0.35s,color 0.35s;background:var(--surface);color:var(--text-primary)}
        .form-input::placeholder{color:var(--text-muted)}
        .form-input:focus,.form-select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(var(--accent-rgb),0.12)}
        .form-row{display:grid;grid-template-columns:1fr 1fr;gap:0.75rem}

        .btn{display:inline-flex;align-items:center;justify-content:center;gap:0.4rem;padding:0.65rem 1.25rem;border-radius:var(--radius-sm);font-weight:600;cursor:pointer;transition:all var(--transition);font-size:0.875rem;border:none;font-family:inherit;text-decoration:none}
        .btn:active{transform:scale(0.96)}.btn:focus-visible{box-shadow:0 0 0 3px rgba(var(--accent-rgb),0.2);outline:none}
        .btn-primary{background:var(--accent);color:white;width:100%}.btn-primary:hover{background:var(--accent-hover)}
        .btn-ghost{background:var(--border-subtle);color:var(--text-secondary);width:100%}.btn-ghost:hover{background:var(--border)}
        .btn-sm{padding:0.4rem 0.75rem;font-size:0.8rem;width:auto}
        .btn-success{background:var(--success);color:white}.btn-success:hover{background:#059669}
        .btn-icon{background:none;border:none;cursor:pointer;padding:0.4rem;border-radius:var(--radius-sm);transition:all var(--transition);display:inline-flex;align-items:center;justify-content:center;color:var(--text-secondary)}
        .btn-icon:active{transform:scale(0.9)}.btn-icon svg{width:18px;height:18px}
        .btn-icon:focus-visible{box-shadow:0 0 0 3px rgba(var(--accent-rgb),0.2);outline:none}

        .scanner-zone{border:2px dashed var(--border);border-radius:var(--radius-md);padding:1.25rem;text-align:center;cursor:pointer;transition:all var(--transition);margin-bottom:1rem}
        .scanner-zone:hover{border-color:var(--accent);background:var(--accent-bg)}
        .scanner-zone svg{width:32px;height:32px;color:var(--text-muted);margin-bottom:0.5rem}

                    if (!localStorage.getItem(this.storageKey)) {
                        this.state.mode = e.matches ? 'dark' : 'light';
                        this.apply();
                    }
                });
            },

            save() {
                localStorage.setItem(this.storageKey, JSON.stringify(this.state));
            },

            apply() {
                const html = document.documentElement;
                // Theme mode
                if (this.state.mode === 'dark') {
                    html.setAttribute('data-theme', 'dark');
                } else {
                    html.removeAttribute('data-theme');
                }
                // Contrast

                    html.setAttribute('data-contrast', 'high');
                } else {
                    html.removeAttribute('data-contrast');
                }

                    const rgb = this.hexToRgb(hex);

                    document.documentElement.style.setProperty('--custom-accent-dark', dark);
                    document.documentElement.style.setProperty('--custom-accent-rgb', rgb);
                } else if (this.state.colorTheme !== 'professional') {
                    html.setAttribute('data-color-theme', this.state.colorTheme);
                    html.removeAttribute('data-color-theme-custom');
                    // Clear custom vars
                    document.documentElement.style.removeProperty('--custom-accent');
                    document.documentElement.style.removeProperty('--custom-accent-dark');
                    document.documentElement.style.removeProperty('--custom-accent-rgb');

                    html.removeAttribute('data-color-theme');

                    document.documentElement.style.removeProperty('--custom-accent-dark');
                    document.documentElement.style.removeProperty('--custom-accent-rgb');

                const b = parseInt(hex.slice(5, 7), 16);
                return `${r},${g},${b}`;

        function parseReceipt(text){const lines=text.split('\n').map(l=>l.trim()).filter(l=>l.length>0);const tp=[/(?:total|ttl|amt|amount|balance\s*due|sum)[:\s]*\$?\s*([\d,]+\.?\d{0,2})/i,/(?:grand\s*total)[:\s]*\$?\s*([\d,]+\.?\d{0,2})/i];let amount=null,desc=null;for(const p of tp){const m=text.match(p);if(m){amount=parseFloat(m[1].replace(/,/g,''));break}}if(!amount){const a=[];const re=/\$([\d,]+\.?\d{0,2})/g;let m;while((m=re.exec(text))!==null){const v=parseFloat(m[1].replace(/,/g,''));if(v>0&&v<1000000)a.push(v)}if(a.length)amount=Math.max(...a)}for(const l of lines){if(l.length>2&&!/^\d/.test(l)&&!/total|tax|change|cash|card|visa|mc|amex|debit|credit|subtotal/i.test(l)){desc=l.replace(/[|_\-]{2,}/g,'').trim();break}}return{amount,description:desc||null,rawText:text,lineCount:lines.length}}

        /* ==================== SMART INSIGHTS ENGINE ==================== */
        function generateInsights(){
            const insights=[];
            const mi=getMI(),mtx=getCMTx(),ptx=getPrevMTx();
            const me=mtx.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
            const pe=ptx.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
            const savings=mi-me;
            const savingsRate=mi>0?Math.round(savings/mi*100):0;
            const txCount=mtx.length;
            const curCats={};mtx.filter(t=>t.type==='expense').forEach(t=>{curCats[t.category||'other']=(curCats[t.category||'other']||0)+t.amount});
            const prevCats={};ptx.filter(t=>t.type==='expense').forEach(t=>{prevCats[t.category||'other']=(prevCats[t.category||'other']||0)+t.amount});
            CATS.forEach(cat=>{const cur=curCats[cat.id]||0,prev=prevCats[cat.id]||0;if(prev>0&&cur>0){const change=Math.round((cur-prev)/prev*100);if(Math.abs(change)>=15){const up=change>0;insights.push({type:up?'warn':'good',icon:up?'📈':'📉',iconClass:up?'warn':'good',text:`You spent <strong>${up?'+':''}${change}%</strong> on ${cat.name} compared to last month.`,meta:`${dAmt(prev)} → ${dAmt(cur)}`,chip:`<span class="insight-chip ${up?'up':'down'}">${up?'+':''}${change}%</span>`})}}});
            const budgetPct=mi>0?Math.round(me/mi*100):0;
            if(budgetPct>90&&budgetPct<=100){insights.push({type:'warn',icon:'⚠️',iconClass:'info',text:`You've used <strong>${budgetPct}%</strong> of your monthly income. Only <strong>${dAmt(mi-me)}</strong> remains.`,meta:`Spent ${dAmt(me)} of ${dAmt(mi)}`,chip:`<span class="insight-chip alert">${budgetPct}% used</span>`})}
            else if(budgetPct>100){insights.push({type:'warn',icon:'🚨',iconClass:'warn',text:`You've <strong>exceeded</strong> your monthly income by <strong>${dAmt(me-mi)}</strong>. Time to review spending.`,meta:`Spent ${dAmt(me)} vs income ${dAmt(mi)}`,chip:`<span class="insight-chip alert">Over budget</span>`})}
            const avgTx=txCount>0?me/txCount:0;
            mtx.filter(t=>t.type==='expense'&&t.amount>avgTx*3&&t.amount>50).slice(0,3).forEach(t=>{insights.push({type:'info',icon:'💎',iconClass:'tip',text:`Large expense detected: <strong>${dAmt(t.amount)}</strong> for ${esc(t.description)}.`,meta:t.date||'This month',chip:`<span class="insight-chip neutral">${t.category?CATS.find(c=>c.id===t.category)?.name||t.category:'Expense'}</span>`})});
            if(mi>0&&txCount>=3){if(savingsRate>=20){insights.push({type:'good',icon:'🌟',iconClass:'good',text:`Great savings rate of <strong>${savingsRate}%</strong>! You're above the recommended 20%.`,meta:`Saving ${dAmt(savings)} / mo`,chip:`<span class="insight-chip down">${savingsRate}%</span>`})}
            else if(savingsRate>=10){insights.push({type:'tip',icon:'💡',iconClass:'tip',text:`Savings rate is <strong>${savingsRate}%</strong>. Aim for 20% to build a stronger safety net.`,meta:`Saving ${dAmt(savings)} / mo`,chip:`<span class="insight-chip neutral">${savingsRate}%</span>`})}
            else if(savingsRate>=0){insights.push({type:'warn',icon:'⚠️',iconClass:'info',text:`Low savings rate of only <strong>${savingsRate}%</strong>. Consider cutting non-essential spending.`,meta:`Saving ${dAmt(savings)} / mo`,chip:`<span class="insight-chip up">${savingsRate}%</span>`})}
            else{insights.push({type:'warn',icon:'🚨',iconClass:'warn',text:`You're spending more than you earn by <strong>${dAmt(Math.abs(savings))}</strong> this month.`,meta:'Negative cash flow',chip:`<span class="insight-chip alert">Deficit</span>`})}}
            const topCat=Object.entries(curCats).sort((a,b)=>b[1]-a[1])[0];
            if(topCat&&me>0){const catPct=Math.round(topCat[1]/me*100);const catInfo=CATS.find(c=>c.id===topCat[0]);if(catPct>40){insights.push({type:'warn',icon:catInfo?catInfo.icon:'📊',iconClass:'info',text:`<strong>${catInfo?catInfo.name:topCat[0]}</strong> makes up <strong>${catPct}%</strong> of all spending (${dAmt(topCat[1])}).`,meta:'Dominated category',chip:`<span class="insight-chip up">${catPct}%</span>`})}}
            if(ptx.length>0&&txCount>0){const freqChange=Math.round((txCount-ptx.length)/ptx.length*100);if(Math.abs(freqChange)>=30){insights.push({type:'info',icon:'🧾',iconClass:'tip',text:`Transaction count <strong>${freqChange>0?'up':'down'} ${Math.abs(freqChange)}%</strong> from last month (${ptx.length} → ${txCount}).`,meta:'Spending frequency',chip:`<span class="insight-chip neutral">${txCount} txns</span>`})}}
            if(topCat&&me>0){const catInfo=CATS.find(c=>c.id===topCat[0]);const potential=Math.round(topCat[1]*0.15);if(potential>10){insights.push({type:'tip',icon:'✂️',iconClass:'tip',text:`Cutting <strong>${catInfo?catInfo.name:topCat[0]}</strong> by 15% could save you <strong>${dAmt(potential)}/mo</strong>.`,meta:'Potential saving',chip:`<span class="insight-chip neutral">Tip</span>`})}}
            const activeGoals=Goals().filter(g=>getGoalPct(g)<100);
            if(activeGoals.length>0&&savings>0){const nearestGoal=activeGoals.sort((a,b)=>{const ma=getMonthsRemaining(a),mb=getMonthsRemaining(b);return(ma||999)-(mb||999)})[0];if(nearestGoal){const sug=getMonthlySuggestion(nearestGoal);if(sug.amount>0&&savings>=sug.amount){insights.push({type:'tip',icon:nearestGoal.icon||'🎯',iconClass:'tip',text:`You could fully fund your <strong>${esc(nearestGoal.name)}</strong> goal with current savings of ${dAmt(savings)}/mo.`,meta:`Need ${dAmt(sug.amount)}/mo for ${Math.ceil(getMonthsRemaining(nearestGoal)||0)} months`,chip:`<span class="insight-chip neutral">Goal</span>`})}}}
            if(mi===0&&txCount>0){insights.push({type:'warn',icon:'💸',iconClass:'warn',text:`No income sources set up. Add your income to get accurate budget insights.`,meta:'Missing data',chip:`<span class="insight-chip alert">Action needed</span>`})}
            if(pe>0&&me<pe&&me>0){const dropPct=Math.round((pe-me)/pe*100);insights.push({type:'good',icon:'🎉',iconClass:'good',text:`Overall spending dropped <strong>${dropPct}%</strong> compared to last month. Keep it up!`,meta:`${dAmt(pe)} → ${dAmt(me)}`,chip:`<span class="insight-chip down">-${dropPct}%</span>`})}
            if(txCount===0&&mi===0){insights.push({type:'info',icon:'👋',iconClass:'tip',text:`Add income sources and transactions to unlock personalized smart insights.`,meta:'Getting started',chip:`<span class="insight-chip neutral">Welcome</span>`})}
            return insights;
        }

        function computeHealthScore(){
            const mi=getMI(),mtx=getCMTx(),ptx=getPrevMTx();
            const me=mtx.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
            const pe=ptx.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
            let score=50;
            if(mi>0){const sr=me/mi;score+=sr<0.7?25:sr<0.8?20:sr<0.9?12:sr<1?5:-10}
            if(pe>0&&me>0){const trend=(pe-me)/pe;score+=trend>0.2?15:trend>0.1?10:trend>0?5:-5}else if(me===0)score+=10;
            if(mi>0){const pct=me/mi;score+=pct<0.6?10:pct<0.8?7:pct<0.95?3:-5}
            return Math.max(0,Math.min(100,score));
        }

                :goals.map(g=>{const pct=getGoalPct(g),rem=getGoalRemaining(g),color=getGoalColor(g.colorId||'amber'),isComplete=pct>=100,daysLeft=g.targetDate?daysBetween(new Date(),new Date(g.targetDate+'T00:00:00')):null;
                    return`<div class="card" style="padding:0;overflow:hidden"><div style="height:4px;background:${isComplete?'var(--success)':color.bulb}"></div><div style="padding:1.25rem">
                        <div class="goal-card-header"><div class="goal-icon-name"><div class="goal-icon" style="background:${isComplete?'var(--success-border)':color.track}">${g.icon||'🎯'}</div><div><div class="goal-name">${esc(g.name)} ${isComplete?`<span class="completed-badge">Done</span>`:''}</div>${g.targetDate?`<div class="goal-due">${ic('calendar',10)} ${fmtDateShort(g.targetDate)}${daysLeft!==null?(daysLeft>0?` &middot; ${daysLeft}d left`:' &middot; <span style="color:var(--danger)">Past due</span>'):''}</div>`:''}</div></div><div class="goal-card-actions">${!isComplete?`<button class="deposit-btn" data-deposit="${g.id}">${ic('plus',14)} Save</button>`:''}<button class="btn-icon" data-eg="${g.id}" style="color:var(--accent)">${ic('edit')}</button><button class="btn-icon" data-dg="${g.id}" style="color:var(--danger)">${ic('trash')}</button></div></div>
                        ${buildThermometer(g)}
                        <div class="goal-amounts"><span class="goal-saved" style="color:${isComplete?'var(--success)':color.bulb}">${dAmt(g.saved)}</span><span class="goal-target">of ${dAmt(g.target)}</span></div>
                        <div class="goal-progress-row"><div class="progress-track" style="flex:1"><div class="progress-fill" style="width:${pct}%;background:${isComplete?'linear-gradient(90deg,#10b981,#34d399)':`linear-gradient(90deg,${color.bulb},${color.bulb}cc)`}"></div></div><span class="goal-pct" style="color:${isComplete?'var(--success)':color.bulb}">${pct}%</span></div>
                        ${buildContributionCard(g)}
                    </div></div>`}).join('')}`;

            document.getElementById('addGoalBtn').onclick=()=>openGoalModal();
            mc.querySelectorAll('[data-deposit]').forEach(b=>b.onclick=()=>{const g=Goals().find(x=>x.id===b.dataset.deposit);if(g)openDepositModal(g)});
            mc.querySelectorAll('[data-eg]').forEach(b=>b.onclick=()=>{const g=Goals().find(x=>x.id===b.dataset.eg);if(g)openGoalModal(g)});
            mc.querySelectorAll('[data-dg]').forEach(b=>b.onclick=()=>{const g=Goals().find(x=>x.id===b.dataset.dg);if(confirm(`Delete "${g.name}"?`)){sGoals(Goals().filter(x=>x.id!==b.dataset.dg));toast('Goal deleted','error');rGoals()}});
        }

        function openGoalModal(g=null){
            const e=!!g;selectedGoalEmoji=g?g.icon||'🎯':'🎯';selectedGoalColor=g?g.colorId||'amber':'amber';
            const minDate=new Date().toISOString().slice(0,10);
            openModal(`<div class="modal-title">${e?'Edit':'New'} Savings Goal</div>
                <div class="form-group"><label class="form-label">Icon</label><div class="goal-emojis" id="emojiPicker">${GOAL_EMOJIS.map(em=>`<button type="button" class="goal-emoji-btn ${em===selectedGoalEmoji?'selected':''}" data-emoji="${em}">${em}</button>`).join('')}</div></div>
                <div class="form-group"><label class="form-label">Color</label><div class="goal-colors" id="colorPicker">${GOAL_COLORS.map(c=>`<button type="button" class="goal-color-btn ${c.id===selectedGoalColor?'selected':''}" data-color="${c.id}" style="background:${c.bulb}"></button>`).join('')}</div></div>
                <div class="form-group"><label class="form-label">Goal Name</label><input class="form-input" id="gn" placeholder="e.g. Emergency Fund" value="${e?esc(g.name):''}"></div>
                <div class="form-group"><label class="form-label">Target Amount</label><input class="form-input" id="gt" type="number" step="0.01" min="1" placeholder="10000" value="${e?g.target:''}"></div>
                <div class="form-row"><div class="form-group"><label class="form-label">Already Saved</label><input class="form-input" id="gs" type="number" step="0.01" min="0" placeholder="0" value="${e?g.saved:0}"></div><div class="form-group"><label class="form-label">Target Date</label><input class="form-input" id="gd" type="date" min="${minDate}" value="${e?g.targetDate:''}"></div></div>
                <div class="modal-actions"><button class="btn btn-primary" id="saveGoal">${e?'Update Goal':'Create Goal'}</button><button class="btn btn-ghost" id="cancelGoal">Cancel</button></div>`);
            document.getElementById('emojiPicker').addEventListener('click',ev=>{const btn=ev.target.closest('[data-emoji]');if(!btn)return;selectedGoalEmoji=btn.dataset.emoji;document.querySelectorAll('.goal-emoji-btn').forEach(b=>b.classList.toggle('selected',b.dataset.emoji===selectedGoalEmoji))});
            document.getElementById('colorPicker').addEventListener('click',ev=>{const btn=ev.target.closest('[data-color]');if(!btn)return;selectedGoalColor=btn.dataset.color;document.querySelectorAll('.goal-color-btn').forEach(b=>b.classList.toggle('selected',b.dataset.color===selectedGoalColor))});
            const save=()=>{const name=document.getElementById('gn').value.trim(),target=parseFloat(document.getElementById('gt').value),saved=Math.min(parseFloat(document.getElementById('gs').value)||0,target),targetDate=document.getElementById('gd').value;if(!name){toast('Enter a goal name','error');return}if(!target||target<=0){toast('Enter a target amount','error');return}let goals=Goals();if(e)goals=goals.map(x=>x.id===g.id?{...x,name,target,saved,targetDate,icon:selectedGoalEmoji,colorId:selectedGoalColor}:x);else goals.push({id:uid(),name,target,saved,targetDate,icon:selectedGoalEmoji,colorId:selectedGoalColor,createdAt:new Date().toISOString()});sGoals(goals);toast(e?'Goal updated':'Goal created','success');closeModal();rGoals()};
            document.getElementById('saveGoal').onclick=save;document.getElementById('cancelGoal').onclick=closeModal;document.getElementById('gt').onkeydown=ev=>{if(ev.key==='Enter')save()};
        }

        function openDepositModal(g){
            const rem=getGoalRemaining(g);const color=getGoalColor(g.colorId||'amber');
            openModal(`<div class="modal-title">Add to ${esc(g.name)}</div>
                <div style="text-align:center;margin-bottom:1rem"><div style="font-size:2rem;margin-bottom:0.5rem">${g.icon||'🎯'}</div><div style="font-size:0.85rem;color:var(--text-secondary)">Remaining: <strong style="color:${color.bulb}">${dAmt(rem)}</strong></div><div style="font-size:0.75rem;color:var(--text-muted);margin-top:0.25rem">Current: ${dAmt(g.saved)} / ${dAmt(g.target)}</div></div>
                <div class="form-group"><label class="form-label">Amount to Add</label><input class="form-input" id="depAmt" type="number" step="0.01" min="0.01" max="${rem}" placeholder="0.00"></div>
                <div style="display:flex;gap:0.4rem;margin-bottom:1rem;flex-wrap:wrap">${[10,25,50,100,250].filter(v=>v<=rem).map(v=>`<button class="btn btn-sm" style="background:${color.track};color:${color.bulb};border:1px solid ${color.bulb}33" data-qdep="${v}">${dAmt(v)}</button>`).join('')}</div>
                <div class="modal-actions"><button class="btn btn-success" id="saveDep" style="background:${color.bulb}">${ic('plus',16)} Add Savings</button><button class="btn btn-ghost" id="cancelDep">Cancel</button></div>`);
            document.querySelectorAll('[data-qdep]').forEach(b=>b.onclick=()=>{document.getElementById('depAmt').value=b.dataset.qdep});
            const save=()=>{const amt=parseFloat(document.getElementById('depAmt').value);if(!amt||amt<=0){toast('Enter an amount','error');return}if(amt>rem){toast(`Maximum is ${dAmt(rem)}`,'error');return}
                sGoals(Goals().map(x=>{if(x.id===g.id)return{...x,saved:Math.min(x.saved+amt,x.target)};return x}));
                toast(`${dAmt(amt)} added to ${g.name}`,'success');closeModal();
                const updated=Goals().find(x=>x.id===g.id);
                if(updated&&updated.saved>=updated.target){setTimeout(()=>{toast('Goal completed!','success');rGoals();setTimeout(()=>{document.querySelectorAll('.card').forEach(card=>{const rect=card.getBoundingClientRect();for(let i=0;i<12;i++){const p=document.createElement('div');p.className='confetti-piece';p.style.left=Math.random()*rect.width+'px';p.style.top='-10px';p.style.background=['#f59e0b','#10b981','#3b82f6','#8b5cf6','#ef4444','#ec4899'][Math.floor(Math.random()*6)];p.style.animationDelay=Math.random()*0.5+'s';p.style.animationDuration=(0.8+Math.random()*0.8)+'s';card.style.position='relative';card.style.overflow='hidden';card.appendChild(p);setTimeout(()=>p.remove(),2500)}})},200)},300)}
                else rGoals()};
            document.getElementById('saveDep').onclick=save;document.getElementById('cancelDep').onclick=closeModal;document.getElementById('depAmt').onkeydown=ev=>{if(ev.key==='Enter')save()};
        }

        function getGoalStatus(g){const pct=getGoalPct(g);if(pct>=100)return'completed';const months=getMonthsRemaining(g);if(months!==null&&months<=0)return'overdue';const sug=getMonthlySuggestion(g);const mi=getMI(),me=getCMTx().filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);const avail=mi-me;if(sug.amount>0&&avail>0&&sug.amount>avail)return'behind';return'ontrack'}

        /* ===== INIT ===== */
        buildPinPad();
        await ReceiptDB.init();
        await Sec.init();
    })();
    </script>
</body>
</html>
